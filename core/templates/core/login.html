{% extends "core/base.html" %}
{% block title %}Login – Octotrial{% endblock %}
{% block content %}
<div style="max-width:400px;margin:5rem auto"><div class="card" style="border-top:3px solid var(--octo-teal)">
<div style="text-align:center;margin-bottom:1.5rem">
<div style="width:48px;height:48px;background:var(--octo-teal);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:var(--octo-dark);margin-bottom:.8rem">O</div>
<h2 style="color:var(--octo-white);font-size:1.2rem">LinkedIn Dashboard</h2>
<p style="color:var(--octo-muted);font-size:.85rem;margin-top:.3rem">Octotrial</p>
</div>
{% if form.errors %}<div class="msg msg-error">Benutzername oder Passwort falsch.</div>{% endif %}
<form method="post">{% csrf_token %}
<div class="form-group"><label>Benutzername</label><input type="text" name="username" class="form-input" autofocus></div>
<div class="form-group"><label>Passwort</label><input type="password" name="password" class="form-input"></div>
<button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem">Einloggen</button>
</form></div></div>
{% endblock %}
