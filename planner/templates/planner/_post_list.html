{% for p in posts %}
<div style="background:#fff;border:0.5px solid #e0e0e0;border-radius:10px;padding:12px 14px">
  <div style="display:flex;gap:10px;align-items:center">
    {% if p.image %}
    <img src="/media/{{ p.image }}" style="width:56px;height:56px;border-radius:6px;object-fit:cover;flex-shrink:0">
    {% else %}
    <div style="width:56px;height:56px;border-radius:6px;background:{{ p.bg }};flex-shrink:0;display:flex;align-items:center;justify-content:center">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="{{ p.fg }}" stroke-width="1.5"/></svg>
    </div>
    {% endif %}
    <div style="flex:1;min-width:0">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
        <span style="font-size:11px;padding:1px 8px;border-radius:99px;background:{{ p.bg }};color:{{ p.fg }}">{{ p.topic_name }}</span>
        {% if p.planned_date %}<span style="font-size:11px;color:#6c757d">📅 {{ p.planned_date|date:"d.m.Y" }}</span>{% endif %}
      </div>
      <p style="font-size:13px;color:#212529;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ p.title|default:p.content|truncatechars:80 }}</p>
      {% if p.comment %}<p style="font-size:12px;color:#6c757d;margin:3px 0 0;font-style:italic">{{ p.comment }}</p>{% endif %}
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
      <select onchange="setStatus({{ p.id }}, this.value)" style="font-size:12px;padding:3px 6px;border:0.5px solid #ced4da;border-radius:4px">
        {% for s in statuses %}<option {% if s == p.status %}selected{% endif %}>{{ s }}</option>{% endfor %}
      </select>
    </div>
  </div>
</div>
{% empty %}
<p style="text-align:center;color:#6c757d;padding:2rem">No posts here yet.</p>
{% endfor %}
