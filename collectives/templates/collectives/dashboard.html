<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collectives Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f5f7fa; }
        .navbar { background:white; border-bottom:1px solid #e0e0e0; padding:0 24px; display:flex; align-items:center; gap:32px; height:56px; }
        .navbar .brand { font-size:18px; font-weight:700; color:#0a66c2; }
        .navbar a { color:#555; text-decoration:none; font-size:14px; padding:4px 0; border-bottom:2px solid transparent; cursor:pointer; }
        .navbar a.active { color:#0a66c2; border-bottom-color:#0a66c2; }
        .navbar a:hover { color:#0a66c2; }
        .status-badge { margin-left:auto; padding:4px 12px; border-radius:12px; font-size:12px; font-weight:600; }
        .status-badge.connected { background:#e8f5e9; color:#2e7d32; }
        .status-badge.disconnected { background:#fce4ec; color:#c62828; }
        .tab-content { display:none; padding:24px; }
        .tab-content.active { display:block; }
        .btn { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600; }
        .btn-primary { background:#0a66c2; color:white; }
        .btn-primary:hover { background:#084d96; }
        .btn-excel { background:#217346; color:white; }
        .btn-excel:hover { background:#185a38; }
        .btn-group { display:flex; gap:8px; }
        .dash-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .dash-header h2 { font-size:20px; color:#333; }
        .search-box { width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; margin-bottom:16px; }
        .filter-chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
        .chip { padding:5px 12px; border-radius:20px; font-size:13px; cursor:pointer; border:2px solid transparent; background:#eee; color:#555; }
        .chip.active { border-color:#0a66c2; background:#e8f0fe; color:#0a66c2; }
        .chip:hover { background:#ddd; }
        .status-table-wrap { background:white; border-radius:8px; border:1px solid #e0e0e0; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { background:#4472C4; color:white; padding:10px 14px; text-align:left; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
        td { padding:10px 14px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        tr:hover td { background:#f5f8ff; }
        .folder-cell { color:#888; font-size:12px; }
        select.status-select, select.typ-select { padding:5px 8px; border-radius:6px; border:1px solid #ddd; font-size:13px; cursor:pointer; background:white; }
        select.status-select { min-width:180px; }
        select.typ-select { min-width:100px; }
        select:focus { outline:none; border-color:#0a66c2; }
        .status-wip { background:#FFF9C4; }
        .status-ready { background:#C8E6C9; }
        .status-posted { background:#BBDEFB; }
        .status-rejected { background:#FFCDD2; }
        .page-link { color:#0a66c2; text-decoration:none; font-size:12px; }
        .page-link:hover { text-decoration:underline; }
        .saved-indicator { color:#2e7d32; font-size:11px; margin-left:6px; display:none; }
        .loading { text-align:center; color:#888; padding:32px; }
        .error-msg { background:#fce4ec; color:#c62828; padding:12px 16px; border-radius:8px; text-align:center; }
        .page-count-badge { background:#0a66c2; color:white; border-radius:50%; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; margin-left:8px; }
        .kollektive-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .kollektive-header h2 { font-size:20px; color:#333; }
        .tree-container { background:white; border-radius:8px; border:1px solid #e0e0e0; }
        .tree-node-header { display:flex; align-items:center; gap:6px; padding:9px 12px; cursor:pointer; border-bottom:1px solid #f0f0f0; user-select:none; font-size:14px; font-weight:600; color:#333; background:#f8f9fa; }
        .tree-node-header:hover { background:#e8f0fe; }
        .tree-node-toggle { width:16px; text-align:center; font-size:11px; color:#888; transition:transform 0.15s; }
        .tree-node-toggle.open { transform:rotate(90deg); }
        .tree-node-count { background:#0a66c2; color:white; border-radius:10px; padding:1px 7px; font-size:11px; font-weight:700; }
        .tree-node-children { display:none; }
        .tree-node-children.open { display:block; }
        .tree-page { display:flex; align-items:center; gap:8px; padding:7px 12px; border-bottom:1px solid #f5f5f5; font-size:13px; color:#444; }
        .tree-page:hover { background:#f0f4ff; }
        .tree-page-title { flex:1; }
        .tree-page-meta { font-size:11px; color:#aaa; white-space:nowrap; }
        .tree-page-link { font-size:11px; color:#0a66c2; text-decoration:none; white-space:nowrap; margin-left:8px; }
        .tree-page-link:hover { text-decoration:underline; }
        .settings-card { background:white; border-radius:10px; padding:28px; max-width:500px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
        .settings-card h3 { font-size:17px; margin-bottom:20px; color:#333; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:11px; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
        .form-group input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; }
        .form-group input:focus { outline:none; border-color:#0a66c2; }
        .btn-row { display:flex; gap:10px; margin-top:20px; }
        .alert { padding:10px 14px; border-radius:6px; font-size:13px; margin-top:12px; display:none; }
        .alert.success { background:#e8f5e9; color:#2e7d32; }
        .alert.error { background:#fce4ec; color:#c62828; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand">📊 Collectives Dashboard</div>
        <a onclick="showTab('dashboard', this)" class="active">Dashboard</a>
        <a onclick="showTab('kollektive', this)">Kollektive</a>
        <a onclick="showTab('settings', this)">Settings</a>
        <a href="{% url 'logout' %}" title="Logout">🔒 Logout</a>
        <span class="status-badge disconnected" id="statusBadge">Not connected</span>
    </div>

    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content active">
        <div class="dash-header">
            <h2>Post Status <span class="page-count-badge" id="dashCount">0</span></h2>
            <div class="btn-group">
                <button class="btn btn-excel" onclick="exportExcel()">📊 Excel Export</button>
                <button class="btn btn-primary" onclick="loadDashboard()">Refresh</button>
            </div>
        </div>
        <input type="text" class="search-box" id="dashSearch" placeholder="Search by title or folder..." oninput="filterDashboard()">
        <div class="filter-chips">
            <span class="chip" onclick="setFilter('Post', this)">Post</span>
            <span class="chip" onclick="setFilter('Other', this)">Other</span>
            <span class="chip" onclick="setFilter('__kein__', this)">No Status</span>
            <span class="chip active" onclick="setFilter('', this)">All</span>
        </div>
        <div id="dashContainer">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Kollektive Tab -->
    <div id="tab-kollektive" class="tab-content">
        <div class="kollektive-header">
            <h2>Kollektive: <span id="kollName">-</span> <span class="page-count-badge" id="pageCount">0</span></h2>
            <div class="btn-group">
                <button class="btn btn-excel" onclick="exportExcel()">📊 Excel Export</button>
                <button class="btn btn-primary" onclick="loadPages()">Refresh</button>
            </div>
        </div>
        <div id="pagesContainer">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Settings Tab -->
    <div id="tab-settings" class="tab-content">
        <div class="settings-card">
            <h3>⚙️ Nextcloud Credentials</h3>
            <div class="form-group">
                <label>Nextcloud URL</label>
                <input type="text" id="ncUrl" placeholder="https://nextcloud.example.com">
            </div>
            <div class="form-group">
                <label>Kollektive Name</label>
                <input type="text" id="kollektiveName" placeholder="My Collective">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="ncUser" placeholder="username">
            </div>
            <div class="form-group">
                <label>App-Password</label>
                <input type="password" id="ncPass" placeholder="app-password">
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="saveConfig()">Save</button>
                <button class="btn btn-primary" onclick="testConnection()">Test Connection</button>
            </div>
            <div class="alert" id="settingsAlert"></div>
        </div>
    </div>

    <script>
        let allPages = [];
        let cfg = {};
        let activeFilter = '';

        function showTab(name, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.navbar a').forEach(a => a.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            if (el) el.classList.add('active');
            if (name === 'dashboard') loadDashboard();
            if (name === 'kollektive') loadPages();
        }

        async function loadConfig() {
            const r = await fetch('/collectives/api/config/');
            cfg = await r.json();
            const badge = document.getElementById('statusBadge');
            if (cfg.connected) {
                badge.textContent = 'Connected: ' + cfg.kollektive_name;
                badge.className = 'status-badge connected';
            } else {
                badge.textContent = 'Not connected';
                badge.className = 'status-badge disconnected';
            }
            document.getElementById('kollName').textContent = cfg.kollektive_name || '-';
            if (cfg.nextcloud_url) document.getElementById('ncUrl').value = cfg.nextcloud_url;
            if (cfg.kollektive_name) document.getElementById('kollektiveName').value = cfg.kollektive_name;
            if (cfg.username) document.getElementById('ncUser').value = cfg.username;
        }

        async function saveConfig() {
            const payload = {
                nextcloud_url: document.getElementById('ncUrl').value,
                kollektive_name: document.getElementById('kollektiveName').value,
                username: document.getElementById('ncUser').value,
                app_password: document.getElementById('ncPass').value
            };
            const r = await fetch('/collectives/api/config/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify(payload)
            });
            const data = await r.json();
            showAlert(data.success ? 'Saved!' : 'Error', data.success ? 'success' : 'error');
            await loadConfig();
        }

        async function testConnection() {
            const r = await fetch('/collectives/api/test-connection/', {
                method: 'POST',
                headers: {'X-CSRFToken': getCookie('csrftoken')}
            });
            const data = await r.json();
            showAlert(data.message, data.success ? 'success' : 'error');
            await loadConfig();
        }

        function showAlert(msg, type) {
            const el = document.getElementById('settingsAlert');
            el.textContent = msg;
            el.className = 'alert ' + type;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        async function loadDashboard() {
            const container = document.getElementById('dashContainer');
            container.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const r = await fetch('/collectives/api/pages/');
                const data = await r.json();
                if (!data.success) {
                    container.innerHTML = `<div class="error-msg">${data.message}</div>`;
                    return;
                }
                allPages = data.pages || [];
                document.getElementById('dashCount').textContent = allPages.length;
                renderDashboard(allPages);
            } catch(e) {
                container.innerHTML = '<div class="error-msg">Connection error.</div>';
            }
        }

        function setFilter(val, el) {
            activeFilter = val;
            document.querySelectorAll('.filter-chips .chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            filterDashboard();
        }

        function filterDashboard() {
            const q = document.getElementById('dashSearch').value.toLowerCase();
            let filtered = allPages;
            if (activeFilter === '__kein__') {
                filtered = filtered.filter(p => !p.typ || p.typ === '');
            } else if (activeFilter) {
                filtered = filtered.filter(p => p.typ === activeFilter);
            }
            if (q) {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(q) || 
                    (p.folder||'').toLowerCase().includes(q)
                );
            }
            renderDashboard(filtered);
        }

        function statusClass(s) {
            if (s === '📝 In Progress') return 'status-wip';
            if (s === '🚀 Ready to Post') return 'status-ready';
            if (s === '📤 Posted') return 'status-posted';
            if (s === '❌ Rejected') return 'status-rejected';
            return '';
        }

        function renderDashboard(pages) {
            const container = document.getElementById('dashContainer');
            if (!pages.length) {
                container.innerHTML = '<div class="loading">No entries found.</div>';
                return;
            }
            let html = `<div class="status-table-wrap"><table>
                <thead><tr><th>Title</th><th>Folder</th><th>Type</th><th>Status</th><th>Modified</th><th>Link</th></tr></thead><tbody>`;
            
            pages.forEach((p, i) => {
                const sc = statusClass(p.status);
                const escapedPath = p.path.replace(/'/g, "\\'");
                html += `<tr class="${sc}" id="row_${i}">
                    <td><strong>${p.title}</strong></td>
                    <td class="folder-cell">${p.folder || '—'}</td>
                    <td>
                        <select class="typ-select" onchange="saveTyp('${escapedPath}', this, ${i})">
                            <option value="" ${!p.typ?'selected':''}>—</option>
                            <option value="Post" ${p.typ==='Post'?'selected':''}>Post</option>
                            <option value="Other" ${p.typ==='Other'?'selected':''}>Other</option>
                        </select>
                    </td>
                    <td>
                        <select class="status-select" onchange="saveStatus('${escapedPath}', this, ${i})">
                            <option value="" ${!p.status?'selected':''}>— no status —</option>
                            <option value="📝 In Progress" ${p.status==='📝 In Progress'?'selected':''}>📝 In Progress</option>
                            <option value="🚀 Ready to Post" ${p.status==='🚀 Ready to Post'?'selected':''}>🚀 Ready to Post</option>
                            <option value="📤 Posted" ${p.status==='📤 Posted'?'selected':''}>📤 Posted</option>
                            <option value="❌ Rejected" ${p.status==='❌ Rejected'?'selected':''}>❌ Rejected</option>
                        </select>
                        <span class="saved-indicator" id="saved_${i}">✓</span>
                    </td>
                    <td>${formatDate(p.modified)}</td>
                    <td><a class="page-link" href="${p.url}" target="_blank">Open →</a></td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        async function saveStatus(path, selectEl, idx) {
            const status = selectEl.value;
            const row = document.getElementById('row_' + idx);
            row.className = statusClass(status);
            const page = allPages.find(p => p.path === path);
            if (page) page.status = status;
            await fetch('/collectives/api/status/set/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify({ path, status })
            });
            const indicator = document.getElementById('saved_' + idx);
            indicator.style.display = 'inline';
            setTimeout(() => indicator.style.display = 'none', 2000);
        }

        async function saveTyp(path, selectEl, idx) {
            const typ = selectEl.value;
            const page = allPages.find(p => p.path === path);
            if (page) page.typ = typ;
            await fetch('/collectives/api/status/set/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify({ path, typ })
            });
            const indicator = document.getElementById('saved_' + idx);
            indicator.style.display = 'inline';
            setTimeout(() => indicator.style.display = 'none', 2000);
        }

        async function loadPages() {
            const container = document.getElementById('pagesContainer');
            container.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const r = await fetch('/collectives/api/pages/');
                const data = await r.json();
                if (!data.success) {
                    container.innerHTML = `<div class="error-msg">${data.message}</div>`;
                    return;
                }
                allPages = data.pages || [];
                document.getElementById('pageCount').textContent = allPages.length;
                renderTree(allPages);
            } catch(e) {
                container.innerHTML = '<div class="error-msg">Connection error.</div>';
            }
        }

        function buildTree(pages) {
            const root = { children: {}, pages: [] };
            pages.forEach(p => {
                const parts = p.folder_parts && p.folder_parts.length > 0 ? p.folder_parts : [];
                let node = root;
                parts.forEach(part => {
                    if (!node.children[part]) node.children[part] = { children: {}, pages: [] };
                    node = node.children[part];
                });
                node.pages.push(p);
            });
            return root;
        }

        function renderTree(pages) {
            const container = document.getElementById('pagesContainer');
            if (!pages.length) {
                container.innerHTML = '<div class="loading">No pages found.</div>';
                return;
            }
            const tree = buildTree(pages);
            container.innerHTML = '<div class="tree-container">' + renderNode(tree, 0) + '</div>';
        }

        function renderNode(node, depth) {
            let html = '';
            const indent = depth * 20;
            
            node.pages.forEach(p => {
                html += `<div class="tree-page">
                    <span style="width:${indent+24}px;display:inline-block"></span>
                    <span style="color:#aaa;font-size:13px">📄</span>
                    <span class="tree-page-title">${p.title}</span>
                    <span class="tree-page-meta">${formatDate(p.modified)} · ${formatSize(p.size)}</span>
                    <a class="tree-page-link" href="${p.url}" target="_blank">Open in Nextcloud →</a>
                </div>`;
            });
            
            Object.keys(node.children).sort().forEach(folderName => {
                const child = node.children[folderName];
                const total = countPages(child);
                const id = 'node_' + Math.random().toString(36).substr(2,9);
                html += `<div>
                    <div class="tree-node-header" onclick="toggleNode('${id}')">
                        <span style="width:${indent}px;display:inline-block"></span>
                        <span class="tree-node-toggle" id="tog_${id}">▶</span>
                        <span>📁</span>
                        <span style="flex:1">${folderName}</span>
                        <span class="tree-node-count">${total}</span>
                    </div>
                    <div class="tree-node-children" id="${id}">${renderNode(child, depth+1)}</div>
                </div>`;
            });
            return html;
        }

        function countPages(node) {
            let c = node.pages.length;
            Object.values(node.children).forEach(ch => c += countPages(ch));
            return c;
        }

        function toggleNode(id) {
            document.getElementById(id).classList.toggle('open');
            document.getElementById('tog_' + id).classList.toggle('open');
        }

        function formatDate(s) {
            if (!s) return '';
            try {
                return new Date(s).toLocaleDateString('en-US');
            } catch(e) {
                return s;
            }
        }

        function formatSize(b) {
            if (!b) return '0 KB';
            return (b/1024).toFixed(1) + ' KB';
        }

        function exportExcel() {
            window.location.href = '/collectives/api/export-excel/';
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        loadConfig();
        loadDashboard();
    </script>
</body>
</html>
