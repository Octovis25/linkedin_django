{% extends "base.html" %}
{% block title %}Statistics – Timeline{% endblock %}
{% block content %}
<style>
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.sh h1{margin:0;font-size:1.5rem}
.cc{background:#fff;border-radius:.5rem;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:1.5rem}
.cc h2{font-size:1.1rem;margin-bottom:1rem}
.pt{width:100%;border-collapse:collapse;font-size:.85rem}
.pt th{text-align:left;padding:.5rem;border-bottom:2px solid #dee2e6;font-weight:600;color:#495057}
.pt td{padding:.5rem;border-bottom:1px solid #f0f0f0}
.post-row{cursor:pointer;transition:background .15s}
.post-row:hover{background:#f0f8ff}
.post-chart-container{display:none;padding:1rem;background:#fafbfc;border-bottom:2px solid #e9ecef}
.post-chart-container.open{display:block}
.post-chart-container canvas{max-height:250px}
.badge-top5{display:inline-block;background:#0077B5;color:#fff;font-size:.65rem;padding:.1rem .4rem;border-radius:.25rem;margin-left:.5rem;vertical-align:middle}
.loading{text-align:center;color:#6c757d;padding:1rem;font-size:.85rem}
</style>

<div class="sh"><h1>📊 LinkedIn Statistics – Timeline</h1></div>

<!-- TOP 5 CHART -->
<div class="cc">
  <h2>📈 Top 5 Posts – Impressions nach Tagen seit Veröffentlichung</h2>
  <canvas id="top5chart" height="100"></canvas>
</div>

{% endblock %}
