{% extends "core/base.html" %}
{% block title %}Post loeschen{% endblock %}
{% block content %}
<div style="max-width:500px"><div class="card">
<h2>Wirklich loeschen?</h2>
<p style="margin-bottom:1rem;color:var(--octo-muted)">Post <strong style="color:var(--octo-white)">{{ post.post_id }}</strong> vom <strong style="color:var(--octo-white)">{{ post.post_date }}</strong> wird unwiderruflich geloescht.</p>
<form method="post">{% csrf_token %}
<div style="display:flex;gap:.5rem">
<button type="submit" class="btn btn-danger">Ja, loeschen</button>
<a href="{% url 'posts_posted:list' %}" class="btn btn-secondary">Abbrechen</a>
</div></form></div></div>
{% endblock %}
